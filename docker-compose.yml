services:
  backend:
    build:
      context: ./backend
    image: careeragent-backend:local
    volumes:
      - ./backend:/app/backend
      - ./backend/local_data:/app/backend/local_data
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-CareerAgent API}
      APP_ENV: ${APP_ENV:-development}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required. Copy .env.example to .env for local dev and replace it with a strong random secret for production.}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-60}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-0}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-MKlKIfl6Htn3qasq6OmUZrAptCgKZk_unRl07h5u6Ew=}
      DATA_ENCRYPTION_KEY_ID: ${DATA_ENCRYPTION_KEY_ID:-local-dev-v1}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/backend/local_data/careeragent.db}
      AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-deterministic}
      LLM_PROVIDER: ${LLM_PROVIDER:-deterministic}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-bow-v1}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      VECTOR_STORE: ${VECTOR_STORE:-local}
      RAG_RETRIEVAL_MODE: ${RAG_RETRIEVAL_MODE:-lexical}
      ENABLE_REAL_LLM: ${ENABLE_REAL_LLM:-false}
      ENABLE_REAL_EMBEDDING: ${ENABLE_REAL_EMBEDDING:-false}

  frontend:
    build:
      context: ./frontend
    image: careeragent-frontend:local
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
