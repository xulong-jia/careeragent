services:
  backend:
    build:
      context: ./backend
    image: careeragent-backend:local
    volumes:
      - ./backend:/app/backend
      - ./backend/local_data:/app/backend/local_data
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-CareerAgent API}
      APP_ENV: ${APP_ENV:-development}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/backend/local_data/careeragent.db}

  frontend:
    build:
      context: ./frontend
    image: careeragent-frontend:local
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
