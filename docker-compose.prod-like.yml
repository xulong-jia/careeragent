services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeragent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careeragent-prod-like-local-password-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-careeragent}
    volumes:
      - careeragent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-careeragent} -d $${POSTGRES_DB:-careeragent}",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: careeragent-backend:prod-like
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - careeragent_local_data:/app/backend/local_data
    environment:
      APP_NAME: ${APP_NAME:-CareerAgent API}
      APP_ENV: production
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      PORT: 8000
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:8080}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-60}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-120}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      DATA_ENCRYPTION_KEY_ID: ${DATA_ENCRYPTION_KEY_ID:-prod-like-local-dev-v1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-careeragent}:${POSTGRES_PASSWORD:-careeragent-prod-like-local-password-change-me}@postgres:5432/${POSTGRES_DB:-careeragent}}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_ECHO_SQL: ${DB_ECHO_SQL:-false}
      LOCAL_DATA_DIR: /app/backend/local_data
      AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-deterministic}
      LLM_PROVIDER: ${LLM_PROVIDER:-deterministic}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-bow-v1}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      EMBEDDING_PROVIDER_CONFIG_ID: ${EMBEDDING_PROVIDER_CONFIG_ID:-prod-embedding-provider-v1}
      VECTOR_STORE: ${VECTOR_STORE:-local}
      RAG_RETRIEVAL_MODE: ${RAG_RETRIEVAL_MODE:-lexical}
      RAG_RERANKER_MODE: ${RAG_RERANKER_MODE:-none}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-local-score-v1}
      RAG_ANSWER_MODE: ${RAG_ANSWER_MODE:-deterministic_summary}
      ENABLE_REAL_LLM: ${ENABLE_REAL_LLM:-false}
      ENABLE_REAL_EMBEDDING: ${ENABLE_REAL_EMBEDDING:-false}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3)); assert payload['data']['status'] == 'ok'\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: careeragent-frontend:prod-like
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  careeragent_postgres_data:
  careeragent_local_data:
